services:
  team-bhp-mcp:
    image: ${TEAM_BHP_MCP_IMAGE:-team-bhp-mcp:local}
    build:
      context: .
    init: true
    ipc: host
    ports:
      - "${TEAM_BHP_MCP_PORT:-3000}:3000"
    environment:
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:?Set MCP_AUTH_TOKEN before starting the HTTP MCP server}
